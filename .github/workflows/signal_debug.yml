name: signal-debug

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install requests pandas

      - name: Run signal debug
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          PYTHONPATH=. python src/signal_debug.py
